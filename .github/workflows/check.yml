name: "Pre-Commit Check"

on:
  push:
    branches: [ main ]
  pull_request:

env:
  SKIP: run-tests

jobs:
    pre_commit:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3
          - uses: actions/setup-python@v3
            with:
              python-version: '3.10'
          - name: Install dependencies
            run: |
              python3 -m pip install --upgrade pip
              pip install -e .
          - uses: pre-commit/action@v3.0.0
